<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Skipper for Salesforce</title>
    <style>
      :root {
        --ink: #1a1a1a;
        --muted: #6b7280;
        --rule: #e5e7eb;
        --hover: #f3f4f6;
        --accent: #2563eb;
      }
      html, body { margin: 0; padding: 0; }
      body {
        width: 260px;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background: #fff;
      }
      header {
        padding: 12px 14px 8px;
        border-bottom: 1px solid var(--rule);
      }
      header .title { font-weight: 600; font-size: 13px; }
      header .sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
      nav { padding: 6px; display: flex; flex-direction: column; }
      button.item {
        all: unset;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      button.item:hover { background: var(--hover); }
      button.item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
      button.item[disabled] { color: var(--muted); cursor: default; }
      button.item[disabled]:hover { background: transparent; }
      .kbd {
        font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--muted);
        background: #f6f7f9;
        border: 1px solid var(--rule);
        border-radius: 4px;
        padding: 1px 5px;
      }
      .note {
        padding: 6px 14px 10px;
        color: var(--muted);
        font-size: 11px;
        border-top: 1px solid var(--rule);
      }
      .note.hidden { display: none; }
    </style>
  </head>
  <body>
    <header>
      <div class="title">Skipper for Salesforce</div>
      <div class="sub">Command palette for Salesforce</div>
    </header>
    <nav>
      <button class="item" id="openPalette">
        <span>Open palette</span>
        <span class="kbd" id="kbd">⌘⇧K</span>
      </button>
      <button class="item" id="openOptions">
        <span>Options</span>
      </button>
    </nav>
    <div class="note hidden" id="note"></div>
    <script src="popup.js"></script>
  </body>
</html>
